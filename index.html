<!DOCTYPE html>
<html>

<head>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>For Sumaiya Ahmed Shimu</title>

<style>

body{
margin:0;
overflow:hidden;
font-family:Arial;
background:black;
color:white;
text-align:center;
}

/* GALAXY SKY */

body::before{
content:"";
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:url("assets/galaxy.jpg");
background-size:cover;
opacity:.9;
}

/* STARS */

#stars{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:url("assets/star.png");
background-size:cover;
animation:starsMove 60s linear infinite;
opacity:.6;
}

@keyframes starsMove{
0%{transform:translateY(0)}
100%{transform:translateY(-200px)}
}

/* ROCKET */

#rocket{
position:absolute;
bottom:-500px;
left:50%;
transform:translateX(-50%);
width:260px;
animation:rocketFly 7s forwards;
}

@keyframes rocketFly{
0%{bottom:-500px}
60%{bottom:250px}
80%{bottom:220px}
100%{bottom:240px}
}

/* SMOKE */

#smoke{
position:absolute;
bottom:0;
left:50%;
transform:translateX(-50%);
width:420px;
opacity:0;
animation:smoke 3s infinite;
}

@keyframes smoke{
0%{opacity:0; transform:translate(-50%,0) scale(1)}
50%{opacity:1; transform:translate(-50%,-120px) scale(1.4)}
100%{opacity:0}
}

/* LETTER */

#letter{
position:absolute;
top:-300px;
left:50%;
transform:translateX(-50%);
width:240px;
display:none;
cursor:pointer;
animation:drop 3s forwards;
}

@keyframes drop{
0%{top:-300px}
100%{top:220px}
}

#letterText{
position:absolute;
top:240px;
left:50%;
transform:translateX(-50%);
font-weight:bold;
font-size:18px;
display:none;
}

/* LETTER PAGE */

#letterPage{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:url("assets/galaxy.jpg");
background-size:cover;
display:none;
justify-content:center;
align-items:center;
padding:20px;
}

/* MESSAGE BOX */

#message{
background:white;
color:black;
padding:30px;
border-radius:12px;
max-width:600px;
line-height:1.8;
font-size:18px;
max-height:80vh;
overflow:auto;
}

/* MOBILE */

@media(max-width:600px){

#rocket{width:170px}
#letter{width:190px}
#message{font-size:16px}

}

</style>

</head>

<body>

<div id="stars"></div>

<audio id="bgMusic" loop>
<source src="assets/music.mp3" type="audio/mpeg">
</audio>

<img id="rocket" src="assets/rocket.png">

<img id="smoke" src="assets/smoke.png">

<img id="letter" src="assets/letter.png">

<div id="letterText">

For Sumaiya Ahmed Shimu 🌷  
<br>Tap to open

</div>

<div id="letterPage">

<div id="message"></div>

</div>

<script>

/* LETTER SHOW */

setTimeout(()=>{

document.getElementById("letter").style.display="block"
document.getElementById("letterText").style.display="block"

},7000)

/* OPEN LETTER */

document.getElementById("letter").onclick=function(){

document.getElementById("letterPage").style.display="flex"

document.getElementById("bgMusic").play()

startTyping()

}

const text = `Dear Fahmida,

এই চিঠিটা তোমার জন্য।

হয়তো তুমি কখনো ভাবোনি কেউ তোমাকে এভাবে একটা চিঠি লিখবে।

কিন্তু কিছু মানুষ আছে যারা অন্য কারো জীবনে  
অজান্তেই খুব বিশেষ হয়ে যায়।

তুমি আমার কাছে ঠিক তেমনই একজন।

শিমু…

হয়তো আমি মাঝে মাঝে তোমাকে এই নামেই ডাকি।

কিন্তু আমার মনে তুমি সবসময়ই ফাহমিদা।

রাতের আকাশে যত তারা জ্বলে  
তাদের দিকে তাকালে মনে হয় পৃথিবীটা কত বড়।

কিন্তু সেই বড় পৃথিবীতেও  
কিছু মানুষ থাকে যাদের সাথে দেখা হওয়া  
ভাগ্যের ব্যাপার।

তুমি ঠিক তেমনই একজন।

যদি কখনো তোমার মন খারাপ হয়  
মনে রেখো কোথাও একজন আছে  
যে তোমার ভালো থাকার জন্য সবসময় দোয়া করে।

তোমার হাসিটা যেন কখনো হারিয়ে না যায়।

কারণ তুমি হাসলে  
পৃথিবীটা একটু বেশি সুন্দর হয়ে যায়।

🌷 For You  
Sumaiya Ahmed Shimu

From  
Shafiul Mujnabin
`;

let i=0;

function startTyping(){

let speed = 35

let box = document.getElementById("message")

let timer = setInterval(()=>{

box.innerHTML += text.charAt(i)

i++

if(i>=text.length){

clearInterval(timer)

}

},speed)

}

</script>

</body>
</html>
